<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone - ToDo</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="container">
        <h1>ToDo</h1>
        <form id="noteForm">
            <input type="text" id="noteTitle" placeholder="Enter Note Title" required>
            <textarea id="noteContent" placeholder="Enter Note Content" rows="5" required></textarea>
            <button type="submit">Add Note</button>
        </form>
        <div class="filters">
            <button data-filter="all" class="filter active">All</button>
            <button data-filter="active" class="filter">Active</button>
            <button data-filter="completed" class="filter">Completed</button>
        </div>
        <div id="notesContainer"></div>
    </div>
    <script src="todo.js"></script>
</body>
</html>
