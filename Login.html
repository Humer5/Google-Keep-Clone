<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="login-section">
            <h1>Login</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Navigation Section -->
        <div id="home-section" style="display: none;">
            <h3>Welcome to Google Keep</h3>
            <div class="navigation">
                <button onclick="navigateTo('Crud.html')">CRUD Operations</button>
                <button onclick="navigateTo('todo.html')">To-Do List</button>
                <button onclick="navigateTo('ImageOp.html')">Image Notes</button>
            </div>
        </div>
    </div>

    <script src="Login.js"></script>
</body>
</html>
